services:
  - type: web
    name: ikeja-online-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirement.txt && flask db upgrade
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromDatabase:
          name: ikeja-online-db
          property: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: ikeja-online-db
          property: connectionString

databases:
  - name: ikeja-online-db
    plan: free
    databaseName: ikeja_online
    user: postgres
    region: ohio
    postgreSQL Version: 15
