<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - Ikeja Online{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --surface: #ffffff;
            --surface2: #f7f8fc;
            --border: #e4e8f0;
            --text: #0f1117;
            --text2: #5a6380;
            --text3: #9099b5;
            --sidebar-bg: #0f1117;
            --sidebar-text: rgba(255,255,255,0.65);
            --sidebar-active: #ffffff;
            --sidebar-hover-bg: rgba(255,255,255,0.07);
            --c1: #6C63FF; --c2: #FF5E78; --c3: #00C9A7; --c4: #FFB800; --c5: #3B9EFF; --c6: #FF7B54;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow: 0 4px 20px rgba(0,0,0,.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
            --radius: 16px;
            --sidebar-w: 260px;
        }
        [data-theme="dark"] {
            --bg: #0a0c14; --surface: #12151f; --surface2: #181b27; --border: #1e2235;
            --text: #eef0f8; --text2: #8891b0; --text3: #4a5270;
            --sidebar-bg: #0d0f1a; --sidebar-text: rgba(255,255,255,0.5);
            --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
            --shadow: 0 4px 20px rgba(0,0,0,.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,.5);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            transition: background .3s, color .3s; min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        aside {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w); height: 100vh;
            background: var(--sidebar-bg);
            display: flex; flex-direction: column; z-index: 900;
            transition: transform .35s cubic-bezier(.4,0,.2,1);
        }
        .sidebar-logo {
            padding: 1.5rem 1.4rem 1.2rem;
            display: flex; align-items: center; gap: .9rem;
            border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--c1), var(--c2));
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 1.1rem;
            flex-shrink: 0; box-shadow: 0 4px 12px rgba(108,99,255,.5);
        }
        .logo-text strong { font-size: .95rem; font-weight: 800; color: white; display: block; }
        .logo-text span { font-size: .7rem; color: var(--sidebar-text); }

        .sidebar-nav { flex: 1; overflow-y: auto; padding: .8rem 0; scrollbar-width: thin; }
        .nav-label {
            font-size: .65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: rgba(255,255,255,.2);
            padding: .8rem 1.4rem .4rem;
        }
        .nav-item {
            display: flex; align-items: center; gap: .8rem;
            padding: .72rem 1.4rem; color: var(--sidebar-text);
            cursor: pointer; border: none; background: none; width: 100%;
            text-align: left; font-family: inherit; font-size: .88rem;
            font-weight: 500; transition: all .2s; position: relative;
            text-decoration: none;
        }
        .nav-item .nav-icon {
            width: 34px; height: 34px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: .85rem; background: rgba(255,255,255,.06);
            color: var(--sidebar-text); flex-shrink: 0; transition: all .2s;
        }
        .nav-item:hover { color: rgba(255,255,255,.85); background: var(--sidebar-hover-bg); }
        .nav-item:hover .nav-icon { background: rgba(255,255,255,.1); }
        .nav-item.active { color: var(--sidebar-active); }
        .nav-item.active .nav-icon {
            background: linear-gradient(135deg, var(--c1), #8B85FF);
            color: white; box-shadow: 0 4px 12px rgba(108,99,255,.45);
        }
        .nav-item.active::after {
            content: ''; position: absolute; right: 0; top: 50%;
            transform: translateY(-50%); width: 3px; height: 60%;
            background: linear-gradient(to bottom, var(--c1), #8B85FF);
            border-radius: 3px 0 0 3px;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,.06);
            padding: 1rem 1.4rem; flex-shrink: 0;
        }
        .user-card {
            display: flex; align-items: center; gap: .75rem;
            padding: .65rem .8rem; border-radius: 12px;
            cursor: pointer; transition: background .2s;
        }
        .user-card:hover { background: rgba(255,255,255,.06); }
        .user-av {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--c2), var(--c6));
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: .95rem; flex-shrink: 0;
        }
        .user-info strong { font-size: .82rem; font-weight: 700; color: white; display: block; }
        .user-info span { font-size: .7rem; color: rgba(255,255,255,.35); }
        .logout-btn {
            background: none; border: none; cursor: pointer;
            color: rgba(255,255,255,.3); font-size: .9rem;
            margin-left: auto; transition: color .2s; padding: .3rem;
        }
        .logout-btn:hover { color: var(--c2); }

        /* ── OVERLAY ── */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.5); z-index: 850;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.open { display: block; }

        /* ── MAIN ── */
        main {
            margin-left: var(--sidebar-w); min-height: 100vh;
            display: flex; flex-direction: column;
            transition: margin-left .35s cubic-bezier(.4,0,.2,1);
        }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky; top: 0; z-index: 800;
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: .9rem 2rem; display: flex; align-items: center;
            gap: 1rem; box-shadow: var(--shadow-sm); flex-shrink: 0;
        }
        .hamburger {
            display: none; flex-direction: column; gap: 5px;
            cursor: pointer; padding: .4rem; border: none; background: none;
        }
        .hamburger span {
            width: 22px; height: 2px; background: var(--text);
            border-radius: 2px; transition: .3s; display: block;
        }
        .topbar-title { flex: 1; }
        .topbar-title h1 { font-size: 1.25rem; font-weight: 800; color: var(--text); }
        .topbar-title p { font-size: .78rem; color: var(--text2); margin-top: .1rem; }
        .topbar-actions { display: flex; align-items: center; gap: .75rem; }
        .theme-toggle {
            width: 38px; height: 38px; border-radius: 10px;
            border: 1.5px solid var(--border); background: var(--surface2);
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; color: var(--text2);
            font-size: .9rem; transition: all .2s;
        }
        .theme-toggle:hover { border-color: var(--c1); color: var(--c1); }
        .topbar-av {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--c2), var(--c6));
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: .9rem;
        }

        /* ── PAGE CONTENT ── */
        .page-content { flex: 1; padding: 2rem; overflow-y: auto; }

        /* ── CONTENT CARD ── */
        .content-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow-sm);
            overflow: hidden; margin-bottom: 1.5rem;
            transition: background .3s, border-color .3s;
        }
        .card-header {
            padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            justify-content: space-between; gap: 1rem; flex-wrap: wrap;
        }
        .card-title {
            font-size: 1rem; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: .6rem;
        }
        .card-title-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .header-actions { display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }

        /* ── TABLE ── */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        thead th {
            padding: .85rem 1.5rem; text-align: left; font-size: .72rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
            color: var(--text3); background: var(--surface2);
            border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        tbody td {
            padding: .9rem 1.5rem; font-size: .85rem;
            color: var(--text); border-bottom: 1px solid var(--border);
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: background .15s; }
        tbody tr:hover { background: var(--surface2); }

        /* ── BADGES ── */
        .badge {
            display: inline-flex; align-items: center; gap: .3rem;
            padding: .28rem .7rem; border-radius: 20px;
            font-size: .75rem; font-weight: 700; white-space: nowrap;
        }
        .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .badge-green  { background: rgba(0,201,167,.12); color: #00a589; }
        .badge-red    { background: rgba(255,94,120,.12); color: #e83d5a; }
        .badge-amber  { background: rgba(255,184,0,.12);  color: #c48a00; }
        .badge-blue   { background: rgba(59,158,255,.12); color: #1a8aee; }
        .badge-violet { background: rgba(108,99,255,.12); color: #5a52d5; }
        [data-theme="dark"] .badge-green  { background: rgba(0,201,167,.18); color: #00e8c1; }
        [data-theme="dark"] .badge-red    { background: rgba(255,94,120,.18); color: #ff7a93; }
        [data-theme="dark"] .badge-amber  { background: rgba(255,184,0,.18);  color: #ffc533; }
        [data-theme="dark"] .badge-blue   { background: rgba(59,158,255,.18); color: #6ab8ff; }
        [data-theme="dark"] .badge-violet { background: rgba(108,99,255,.18); color: #9d97ff; }

        /* ── BUTTONS ── */
        .btn { padding: .6rem 1.2rem; border: none; border-radius: 8px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all .2s; }
        .btn-primary { background: var(--c1); color: #fff; }
        .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
        .filter-select {
            padding: .45rem .85rem; border: 1.5px solid var(--border);
            border-radius: 9px; background: var(--surface2); color: var(--text);
            font-family: inherit; font-size: .82rem; cursor: pointer;
            transition: border-color .2s; outline: none;
        }
        .filter-select:focus { border-color: var(--c1); }
        .filter-btn {
            padding: .45rem 1rem; border-radius: 9px; border: none;
            background: var(--c1); color: white; font-family: inherit;
            font-size: .82rem; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: .4rem;
            transition: opacity .2s;
        }
        .filter-btn:hover { opacity: .85; }
        .filters-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
        .action-btn {
            padding: .4rem .7rem; border: 1.5px solid var(--border);
            border-radius: 8px; background: var(--surface2); color: var(--text);
            font-size: .82rem; cursor: pointer; outline: none;
            transition: all .2s; display: inline-flex; align-items: center; gap: .4rem;
            font-family: inherit; font-weight: 600; white-space: nowrap;
        }
        .action-btn:hover { background: var(--c1); color: #fff; border-color: var(--c1); }
        .view-btn { color: var(--c5); border-color: rgba(59,158,255,.4); }
        .view-btn:hover { background: var(--c5); color: #fff; border-color: var(--c5); }
        .reverse-btn { color: var(--c2); border-color: rgba(255,94,120,.4); }
        .reverse-btn:hover { background: var(--c2); color: #fff; border-color: var(--c2); }
        .status-select {
            padding: .35rem .65rem; border: 1.5px solid var(--border);
            border-radius: 8px; background: var(--surface2); color: var(--text);
            font-family: inherit; font-size: .78rem; cursor: pointer; outline: none;
        }
        .status-select:focus { border-color: var(--c1); }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.55); display: flex; align-items: center;
            justify-content: center; z-index: 1000; padding: 1rem;
        }
        .modal {
            background: var(--surface); border-radius: var(--radius);
            max-width: 600px; width: 100%; max-height: 90vh;
            overflow-y: auto; padding: 2rem;
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.5rem;
        }
        .modal-close {
            border: none; background: none; font-size: 1.5rem;
            cursor: pointer; color: var(--text2); line-height: 1;
        }
        .address-block {
            background: var(--surface2); padding: 1rem; border-radius: 8px;
            margin-bottom: 1rem; border-left: 3px solid var(--c3);
        }

        /* ── UTILITY ── */
        .detail-item {
            padding: .75rem; border-left: 3px solid var(--c1);
            background: var(--bg); border-radius: 6px;
        }
        .loading-cell { text-align: center; padding: 2.5rem !important; }
        .spinner {
            width: 22px; height: 22px; border: 3px solid var(--border);
            border-top-color: var(--c1); border-radius: 50%;
            animation: spin .7s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            aside { transform: translateX(-100%); }
            aside.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            main { margin-left: 0; }
            .hamburger { display: flex; }
            .page-content { padding: 1rem; }
            .topbar { padding: .8rem 1rem; }
            .topbar-title h1 { font-size: 1.05rem; }
            .topbar-title p { display: none; }
            .card-header { flex-direction: column; align-items: flex-start; }
            .header-actions, .filters-row { width: 100%; }
            .filter-select { flex: 1; min-width: 0; }
            thead th, tbody td { padding: .7rem 1rem; }
        }
        @media (max-width: 480px) {
            .modal { padding: 1.25rem; }
            .action-btn span { display: none; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
            <div class="logo-text">
                <strong>Ikeja Online</strong>
                <span>Admin Panel</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <button class="nav-item {% if page == 'dashboard' %}active{% endif %}" onclick="goTo('/admin/dashboard')">
                <span class="nav-icon"><i class="fas fa-chart-pie"></i></span> Dashboard
            </button>
            <div class="nav-label">Management</div>
            <button class="nav-item {% if page == 'orders' %}active{% endif %}" onclick="goTo('/admin/orders')">
                <span class="nav-icon"><i class="fas fa-bag-shopping"></i></span> Orders
            </button>
            <button class="nav-item {% if page == 'customers' %}active{% endif %}" onclick="goTo('/admin/customers')">
                <span class="nav-icon"><i class="fas fa-users"></i></span> Customers
            </button>
            <button class="nav-item {% if page == 'vendors' %}active{% endif %}" onclick="goTo('/admin/vendors')">
                <span class="nav-icon"><i class="fas fa-store"></i></span> Vendors
            </button>
            <button class="nav-item {% if page == 'products' %}active{% endif %}" onclick="goTo('/admin/products')">
                <span class="nav-icon"><i class="fas fa-shopping-bag"></i></span> Products
            </button>
            <button class="nav-item {% if page == 'categories' %}active{% endif %}" onclick="goTo('/admin/categories')">
                <span class="nav-icon"><i class="fas fa-layer-group"></i></span> Categories
            </button>
            <button class="nav-item {% if page == 'payments' %}active{% endif %}" onclick="goTo('/admin/payments')">
                <span class="nav-icon"><i class="fas fa-credit-card"></i></span> Payments
            </button>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-av" id="sidebarAvatar">A</div>
                <div class="user-info">
                    <strong id="sidebarName">Admin</strong>
                    <span>Super Administrator</span>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <i class="fas fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <main>
        <div class="topbar">
            <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </button>
            <div class="topbar-title">
                <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            </div>
            <div class="topbar-actions">
                <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="topbar-av" id="topbarAvatar">A</div>
            </div>
        </div>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        const token = localStorage.getItem('access_token');
        const role  = localStorage.getItem('user_role');
        if (!token || role !== 'super_admin') window.location.href = '/';

        const firstName = localStorage.getItem('user_first_name') || 'Admin';
        const lastName  = localStorage.getItem('user_last_name')  || '';
        const fullName  = firstName + (lastName ? ' ' + lastName : '');
        const initials  = firstName[0].toUpperCase();

        document.getElementById('sidebarAvatar').textContent = initials;
        document.getElementById('topbarAvatar').textContent  = initials;
        document.getElementById('sidebarName').textContent   = fullName;

        const saved = localStorage.getItem('theme') || 'light';
        applyTheme(saved);

        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('themeBtn');
            if (btn) btn.innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', t);
        }
        function toggleTheme() {
            applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }
        function goTo(path) { closeSidebar(); window.location.href = path; }
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_role');
                localStorage.removeItem('user_first_name');
                localStorage.removeItem('user_last_name');
                window.location.href = '/';
            }
        }
        function authH() {
            return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
