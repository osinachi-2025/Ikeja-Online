{% extends "admin/base.html" %}

{% block title %}Products - Admin Dashboard{% endblock %}
{% block page_title %}Product Management{% endblock %}

{% block content %}
<div class="content-card">
    <div class="card-header">
        <div class="card-title">
            <span class="card-title-dot" style="background:var(--c4)"></span>
            Products
        </div>
        <div class="filters-row">
            <input type="text" id="searchInput" placeholder="Search products..." class="filter-select" style="flex:1;min-width:200px">
            <button onclick="loadProducts()" class="filter-btn">
                <i class="fas fa-search"></i> Search
            </button>
        </div>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Name</th>
                    <th>Vendor</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productsTableBody">
                <tr><td class="loading-cell" colspan="8"><div class="spinner"></div></td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadProducts() {
        const tbody = document.getElementById('productsTableBody');
        tbody.innerHTML = '<tr><td class="loading-cell" colspan="8"><div class="spinner"></div></td></tr>';
        try {
            const q = document.getElementById('searchInput').value.trim();
            const params = new URLSearchParams();
            if (q) params.append('q', q);
            const r = await fetch('/api/admin/products' + (params.toString() ? '?' + params : ''), { headers: authH() });
            const d = await r.json();
            tbody.innerHTML = '';

            if (d.success && d.products && d.products.length) {
                d.products.forEach(p => {
                    tbody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--c1);font-weight:600">#${p.id}</span></td>
                        <td><strong>${p.name}</strong></td>
                        <td style="color:var(--text2)">${p.vendor_name}</td>
                        <td style="color:var(--text2)">${p.category_name}</td>
                        <td style="font-weight:700">₦${parseFloat(p.price).toLocaleString()}</td>
                        <td><span class="badge ${p.stock > 10 ? 'badge-green' : p.stock > 0 ? 'badge-amber' : 'badge-red'}">${p.stock} units</span></td>
                        <td><span class="badge ${p.is_active ? 'badge-green' : 'badge-red'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
                        <td>
                            <button class="action-btn" onclick="deleteProduct(${p.id})" style="color:var(--c2);border-color:var(--c2)">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>`);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="8" class="loading-cell" style="color:var(--text3)">No products found</td></tr>';
            }
        } catch(e) { console.error(e); }
    }

    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;
        try {
            const r = await fetch(`/api/admin/products/${id}`, {
                method: 'DELETE',
                headers: authH()
            });
            const d = await r.json();
            if (d.success) {
                loadProducts();
                alert('Product deleted successfully');
            } else {
                alert('Error: ' + (d.message || 'Unknown error'));
            }
        } catch(e) { console.error(e); }
    }

    loadProducts();
</script>
{% endblock %}
