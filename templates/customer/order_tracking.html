<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - Ikeja Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #0f1113;
            --muted: #9aa0a6;
            --white: #ffffff;
            --gold: #d4af37;
            --orange: #FF6B35;
            --blue: #1e3a5f;
            --radius: 12px;
            --container: 1200px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', 'Poppins', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        .container {
            width: 92%;
            max-width: var(--container);
            margin: 0 auto;
        }

        /* Header */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: linear-gradient(180deg, rgba(0,0,0,0.98), rgba(0,0,0,0.95));
            border-bottom: 1px solid rgba(212,175,55,0.2);
            backdrop-filter: blur(10px);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
        }

        .brand {
            font-weight: 900;
            font-size: 1.6rem;
            color: var(--white);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span {
            color: var(--gold);
        }

        .brand i {
            font-size: 1.8rem;
            color: var(--orange);
        }

        /* Main Content */
        .content-section {
            padding: 60px 0;
        }

        .tracking-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .tracking-card {
            background: var(--card);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .tracking-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tracking-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--orange) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .order-ref {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 20px;
        }

        /* Order Status */
        .order-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,107,53,0.05);
            border: 1px solid rgba(255,107,53,0.2);
            border-radius: var(--radius);
        }

        .status-item {
            text-align: center;
            flex: 1;
        }

        .status-item h4 {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-item p {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(212,175,55,0.2);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            padding-left: 40px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -35px;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(212,175,55,0.3);
            border: 2px solid rgba(212,175,55,0.1);
        }

        .timeline-item.active::before {
            background: var(--orange);
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2);
        }

        .timeline-item.completed::before {
            background: var(--gold);
            border-color: var(--gold);
        }

        .timeline-content {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: var(--radius);
            padding: 20px;
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--white);
        }

        .timeline-description {
            color: var(--muted);
            margin-bottom: 8px;
        }

        .timeline-date {
            font-size: 0.9rem;
            color: var(--muted);
            font-style: italic;
        }

        /* Order Details */
        .order-details {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: var(--radius);
        }

        .order-details h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--white);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--muted);
            font-weight: 600;
        }

        .detail-value {
            color: var(--white);
            font-weight: 600;
        }

        /* Loading/Error States */
        .loading-container {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(212,175,55,0.2);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-container {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .error-container i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tracking-card {
                padding: 20px;
            }

            .tracking-header h1 {
                font-size: 2rem;
            }

            .order-status {
                flex-direction: column;
                gap: 15px;
            }

            .status-item {
                width: 100%;
            }

            .timeline {
                padding-left: 20px;
            }

            .timeline-item {
                padding-left: 30px;
            }

            .timeline-item::before {
                left: -25px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <a href="/" class="brand">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Ikeja</span> Online
                </a>
                <nav class="nav">
                    <a href="/">Home</a>
                    <a href="/categories">Categories</a>
                    <a href="/browse-products">Products</a>
                    <a href="/login">Sign In</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">
        <section class="content-section">
            <div class="tracking-container">
                <div class="tracking-card">
                    <div class="tracking-header">
                        <h1>Order Tracking</h1>
                        <div class="order-ref">Order Reference: <strong id="orderRef">{{ order_ref }}</strong></div>
                    </div>

                    <div id="trackingContent">
                        <div class="loading-container">
                            <div class="spinner"></div>
                            <p>Loading order tracking information...</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Get order reference from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderRef = urlParams.get('ref') || '{{ order_ref }}';

        async function loadOrderTracking() {
            const trackingContent = document.getElementById('trackingContent');

            try {
                const response = await fetch(`/api/orders/track/${orderRef}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Order not found');
                }

                const order = data.order;
                const timeline = data.timeline || [];

                // Update order reference display
                document.getElementById('orderRef').textContent = order.reference_number;

                // Build tracking content
                trackingContent.innerHTML = `
                    <!-- Order Status Overview -->
                    <div class="order-status">
                        <div class="status-item">
                            <h4>Order Status</h4>
                            <p class="text-${getStatusColor(order.status)}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</p>
                        </div>
                        <div class="status-item">
                            <h4>Payment Status</h4>
                            <p class="text-${getStatusColor(order.payment_status)}">${order.payment_status.charAt(0).toUpperCase() + order.payment_status.slice(1)}</p>
                        </div>
                        <div class="status-item">
                            <h4>Shipping Status</h4>
                            <p class="text-${getStatusColor(order.shipping_status)}">${order.shipping_status.charAt(0).toUpperCase() + order.shipping_status.slice(1)}</p>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <div class="timeline">
                        ${timeline.map((item, index) => `
                            <div class="timeline-item ${item.active ? 'active' : ''} ${item.completed ? 'completed' : ''}">
                                <div class="timeline-content">
                                    <div class="timeline-title">${item.title}</div>
                                    <div class="timeline-description">${item.description}</div>
                                    <div class="timeline-date">${item.date}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Order Details -->
                    <div class="order-details">
                        <h3>Order Details</h3>
                        <div class="detail-row">
                            <span class="detail-label">Order Number:</span>
                            <span class="detail-value">#${order.id}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Reference:</span>
                            <span class="detail-value">${order.reference_number}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Date Placed:</span>
                            <span class="detail-value">${new Date(order.created_at).toLocaleDateString('en-NG', {
                                year: 'numeric',
                                month: 'long',
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            })}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Total Amount:</span>
                            <span class="detail-value">₦${Number(order.total_amount).toLocaleString()}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Items:</span>
                            <span class="detail-value">${order.items.length} item${order.items.length !== 1 ? 's' : ''}</span>
                        </div>
                    </div>
                `;
            } catch (error) {
                trackingContent.innerHTML = `
                    <div class="error-container">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Order Not Found</h3>
                        <p>${error.message}</p>
                        <p class="mt-3">If you believe this is an error, please contact our support team.</p>
                        <a href="/" class="btn btn-primary mt-3">Back to Home</a>
                    </div>
                `;
                console.error(error);
            }
        }

        function getStatusColor(status) {
            const colors = {
                'pending': 'warning',
                'processing': 'info',
                'shipped': 'primary',
                'delivered': 'success',
                'cancelled': 'danger',
                'completed': 'success',
                'failed': 'danger'
            };
            return colors[status] || 'secondary';
        }

        document.addEventListener('DOMContentLoaded', loadOrderTracking);
    </script>
</body>
</html>
