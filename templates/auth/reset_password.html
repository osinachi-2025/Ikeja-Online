<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Ikeja Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-8rzlferDg10E0pjRkwKLtD6nHxlrMKs9x4NYss+vL+KAtVnYxt3dMbS4mM2S1K55j2i6u+4AyncDw2cYmvyf/w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3H0DqSl8Gyj8w0gYVjcWw16nB3dWDVhJ8+7Tq1WNcGJNDg+lD0lz5rrBcFW3G80v9LCRb5bHlhQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background: linear-gradient(135deg, #0f2d28 0%, #1a3a2e 50%, #0d5a52 100%);
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200"><defs><pattern id="modern-grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse"><circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.08)"/><path d="M10,30 Q30,20 50,30" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/></pattern></defs><rect width="1200" height="1200" fill="url(%23modern-grid)"/><circle cx="100" cy="200" r="150" fill="rgba(255,107,53,0.08)" opacity="0.5"/><circle cx="1100" cy="900" r="200" fill="rgba(255,107,53,0.06)" opacity="0.3"/></svg>');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }

        .reset-container {
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.95) 100%),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><pattern id="dots-subtle" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1.5" fill="rgba(255,107,53,0.04)"/></pattern></defs><rect width="1200" height="600" fill="url(%23dots-subtle)"/></svg>');
            background-size: cover, auto;
            border-radius: 20px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255,255,255,0.1) inset;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(10px);
        }

        .reset-icon {
            font-size: 3rem;
            color: #FF6B35;
            margin-bottom: 1.5rem;
            display: block;
            text-align: center;
        }

        .reset-card h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .reset-card p {
            color: #666;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #FF6B35;
        }

        .form-control {
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .form-control:focus {
            border-color: #FF6B35;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
            outline: none;
        }

        .password-strength {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            gap: 4px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background-color: #e8e8e8;
            border-radius: 2px;
        }

        .btn-reset {
            background: linear-gradient(135deg, #FF6B35 0%, #ff5722 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.1rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,107,53,0.5);
        }

        .btn-reset:active {
            transform: translateY(0);
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .no-account {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #666;
        }

        .no-account a {
            color: #FF6B35;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .no-account a:hover {
            color: #ff5722;
        }

        /* Alert styles */
        .alert-flash {
            animation: slideInDown 0.5s ease-out, fadeOut 0.5s ease-in 4.5s forwards !important;
            border-radius: 12px !important;
            border: 0 !important;
            padding: 1rem 1.25rem !important;
            font-size: 0.95rem !important;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12) !important;
            position: relative;
            overflow: hidden;
        }

        .alert-flash::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
        }

        .alert-danger.alert-flash {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%) !important;
            color: #721c24 !important;
        }

        .alert-danger.alert-flash::before {
            background: linear-gradient(180deg, #dc3545 0%, #e74c3c 100%);
        }

        .alert-flash .close-btn {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            transition: opacity 0.2s ease;
            padding: 0;
            color: inherit;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .reset-card {
                padding: 2rem 1.5rem;
            }

            .reset-card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <i class="fas fa-key reset-icon"></i>
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>

            {% if error %}
            <div class="alert alert-danger alert-flash" role="alert">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
                <button type="button" class="close-btn" onclick="this.parentElement.style.display='none';">&times;</button>
            </div>
            {% endif %}

            <form method="POST" action="">
                <div class="form-group">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Enter new password" minlength="8">
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <small style="color: #666; font-size: 0.85rem; display: block; margin-top: 0.5rem;">
                        Minimum 8 characters<br>
                        Mix of uppercase, lowercase, numbers recommended
                    </small>
                </div>

                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Confirm your password" minlength="8">
                </div>

                <button type="submit" class="btn-reset">
                    <i class="fas fa-lock-open me-2"></i>Reset Password
                </button>
            </form>

            <div class="no-account">
                Remember your password? <a href="{{ url_for('login') }}">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
