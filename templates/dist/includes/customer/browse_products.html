{% extends "dist/customerdashboard.html" %}

{% block dashboard_current %}
  <div class="col-sm-6">
    <ol class="breadcrumb float-sm-end">
      <li class="breadcrumb-item"><a href="/customer/dashboard/home">Dashboard</a></li>
      <li class="breadcrumb-item active" aria-current="page">Browse Products</li>
    </ol>
  </div>
{% endblock dashboard_current %}

{% block customer_content %}
<div class="app-content">
  <div class="container-fluid">
    <div class="row mb-4">
      <div class="col-12">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title mb-0">Browse Products</h3>
            <span id="productCount" class="badge bg-primary">0 products</span>
          </div>
          <div class="card-body">
            <div id="productAlert" class="alert alert-danger d-none" role="alert"></div>
            <div id="productGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  async function loadBrowseProducts() {
    const productGrid = document.getElementById('productGrid');
    const productCount = document.getElementById('productCount');
    const productAlert = document.getElementById('productAlert');

    productGrid.innerHTML = '<div class="col-12 text-center py-5">Loading products...</div>';
    productAlert.classList.add('d-none');

    try {
      const token = localStorage.getItem('access_token');
      const response = await fetch('/customer/get-products', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => null);
        throw new Error(errorData?.message || 'Unable to load products.');
      }

      const data = await response.json();
      const products = data.products || [];
      productCount.textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;

      if (!products.length) {
        productGrid.innerHTML = '<div class="col-12 text-center py-5">No products available right now.</div>';
        return;
      }

      productGrid.innerHTML = products.map(product => `
        <div class="col">
          <div class="card h-100 shadow-sm">
            <img src="${product.image || '/static/assets/img/product-placeholder.jpg'}" class="card-img-top" alt="${product.name}">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${product.name}</h5>
              <p class="card-text text-truncate">${product.description || 'No description available.'}</p>
              <p class="mb-2 text-muted small">${product.store_name || 'Unknown vendor'}</p>
              <div class="mt-auto d-flex justify-content-between align-items-center">
                <span class="fw-bold text-primary">₦${Number(product.price).toLocaleString()}</span>
                <a href="/product/${product.id}" class="btn btn-sm btn-primary">View</a>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    } catch (error) {
      productGrid.innerHTML = '<div class="col-12 text-center py-5 text-danger">Could not load products.</div>';
      productAlert.textContent = error.message;
      productAlert.classList.remove('d-none');
      console.error(error);
    }
  }

  document.addEventListener('DOMContentLoaded', loadBrowseProducts);
</script>
{% endblock customer_content %}
